<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scopa Pro - Pino Narciso</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com">
    <meta name="theme-color" content="#1e4d2b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root { 
            --panno: #1e4d2b; 
            --legno: #3e2723;
            --oro: #d4af37;
            --card-bg: #ffffff;
            --text: #2c3e50;
            --danger: #e74c3c;
            --success: #27ae60;
        }
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: radial-gradient(circle, var(--panno) 0%, #0a1f11 100%);
            margin: 0; padding: 15px; min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; color: var(--text);
        }
        .card { 
            background: var(--card-bg); padding: 20px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 420px; 
            box-sizing: border-box; border-top: 5px solid var(--oro);
        }
        h1 { text-align: center; color: var(--legno); font-size: 1.6rem; margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 2px; }
        
        label { font-size: 0.8rem; font-weight: bold; color: #7f8c8d; display: block; margin-bottom: 5px; }
        input, select { 
            width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #ecf0f1; 
            margin-bottom: 15px; box-sizing: border-box; font-size: 1.1rem; transition: 0.3s;
            background: white;
        }
        input:focus, select:focus { border-color: var(--panno); outline: none; }

        button { 
            width: 100%; padding: 15px; border: none; border-radius: 12px; 
            font-weight: 800; cursor: pointer; color: white; transition: 0.3s; font-size: 1rem;
        }
        .btn-main { background: var(--panno); box-shadow: 0 4px 0 #14351d; }
        .btn-main:active { transform: translateY(3px); box-shadow: none; }
        
        #confirm-btn { background: #bdc3c7; color: #7f8c8d; }
        #confirm-btn.ready { background: var(--success); color: white; box-shadow: 0 4px 0 #1e8449; }

        .btn-reset { 
            background: #34495e; color: #ecf0f1; border: 1px solid var(--oro); 
            margin-top: 20px; font-size: 0.85rem; box-shadow: 0 4px 0 #1a252f;
        }
        .btn-reset:active { transform: translateY(3px); box-shadow: none; }

        .player-card { 
            background: #f8f9fa; border-radius: 15px; padding: 15px; margin-bottom: 15px;
            border-left: 5px solid var(--panno); transition: 0.3s;
        }
        .dealer-active { border-left-color: var(--oro); background: #fffdf5 !important; border-right: 2px solid var(--oro); }
        .player-name { font-size: 1.1rem; font-weight: bold; color: var(--legno); margin-bottom: 10px; display: block; }
        .grid-inputs { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .sum-check { 
            font-weight: bold; text-align: center; padding: 12px; border-radius: 12px; 
            margin: 15px 0; font-size: 1rem; border: 2px dashed #ddd;
        }
        .sum-ok { background: #e9f7ef; color: var(--success); border-color: var(--success); }
        .sum-err { background: #fdf2f2; color: var(--danger); border-color: #fadbd8; }

        .table-container { width: 100%; overflow-x: auto; margin-top: 15px; }
        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { color: #95a5a6; font-size: 0.65rem; text-transform: uppercase; padding: 5px; text-align: center; min-width: 45px; }
        td { background: #fff; padding: 12px 8px; text-align: center; border-top: 1px solid #eee; border-bottom: 1px solid #eee; white-space: nowrap; }
        td:first-child { border-left: 1px solid #eee; border-radius: 10px 0 0 10px; text-align: left; font-weight: bold; }
        td:last-child { border-right: 1px solid #eee; border-radius: 0 10px 10px 0; }
        .badge { background: var(--panno); color: white; padding: 3px 7px; border-radius: 6px; font-size: 0.8rem; }
        
        .winner { background: #fff3cd !important; border: 2px solid var(--oro) !important; }
        .hidden { display: none; }

        footer { 
            margin-top: 40px; margin-bottom: 20px; padding: 15px 30px; 
            background: rgba(255,255,255,0.15); border-radius: 50px; 
            color: #ffffff; font-size: 0.9rem; text-align: center; 
            border: 1px solid rgba(255,255,255,0.25); 
            backdrop-filter: blur(8px); width: fit-content;
        }
        footer strong { color: var(--oro); text-transform: uppercase; font-weight: 900; }
    </style>
</head>
<body>

    <div class="card" id="setup">
        <h1>Punteggio Scopa 🃏</h1>
        <label>PUNTI VITTORIA</label>
        <select id="limit">
            <option value="11">11 Punti</option>
            <option value="21">21 Punti</option>
        </select>
        <label>SQUADRE (es: Noi, Voi)</label>
        <input id="names" value="Noi, Voi" placeholder="Inserisci nomi...">
        <button class="btn-main" onclick="start()">INIZIA PARTITA</button>
    </div>

    <div class="card hidden" id="game">
        <h1 id="displayHeader">Punteggio</h1>
        <div id="inputs-area"></div>
        <div id="sum-display" class="sum-check sum-err">Punti Mazzo: 0 / 4</div>
        <button id="confirm-btn" onclick="addRound()" disabled>CONFERMA MANO</button>

        <div class="table-container">
            <table>
                <thead id="ranking-head"></thead>
                <tbody id="ranking-body"></tbody>
            </table>
        </div>

        <div style="margin-top: 25px; display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <button style="background:#f3f4f6; color:#4b5563; font-size:0.75rem; line-height: 1.2" onclick="undoLast()">↩ Annulla Ultima Mano</button>
            <button style="background:#d4af37; color: #3e2723; font-size:0.85rem" onclick="shareResults()">📤 Condividi</button>
        </div>
        <button class="btn-reset" onclick="resetGame()">🔄 Nuova Partita</button>
    </div>

    <footer>
        &copy; 2026 - Tutti i diritti riservati<br>
        Sviluppato da <strong>Pino Narciso</strong>
    </footer>

<script>
    let players = [], limit = 11, isGameOver = false, dealerIndex = -1;

    window.onload = () => {
        const saved = localStorage.getItem('scopa_pino_final_v1');
        if (saved) {
            const data = JSON.parse(saved);
            players = data.players;
            limit = data.limit;
            dealerIndex = data.dealerIndex ?? -1;
            isGameOver = data.isGameOver || false;
            showGame();
            render();
        }
    };

    function start() {
        const namesInput = document.getElementById('names').value;
        const names = namesInput.split(',').map(n => n.trim()).filter(n => n);
        if (names.length < 2) return alert('Inserisci i nomi delle squadre!');
        limit = parseInt(document.getElementById('limit').value);
        players = names.map((n, i) => ({ id: i, name: n, score: 0, playerHistory: [] }));
        isGameOver = false;
        dealerIndex = -1;
        showGame();
        save();
        render();
    }

    function showGame() { document.getElementById('setup').classList.add('hidden'); document.getElementById('game').classList.remove('hidden'); }

    function checkSum() {
        const inputs = document.querySelectorAll('.score-in');
        let total = 0;
        inputs.forEach(i => total += parseInt(i.value) || 0);
        const sumDiv = document.getElementById('sum-display');
        const confirmBtn = document.getElementById('confirm-btn');
        sumDiv.innerText = `Punti Mazzo: ${total} / 4`;
        if (total === 4) {
            sumDiv.className = "sum-check sum-ok";
            confirmBtn.disabled = false;
            confirmBtn.classList.add('ready');
        } else {
            sumDiv.className = "sum-check sum-err";
            confirmBtn.disabled = true;
            confirmBtn.classList.remove('ready');
        }
    }

    function addRound() {
        if (dealerIndex === -1) {
            let opzioni = players.map((p, i) => `${i + 1}: ${p.name}`).join('\n');
            let scelta = prompt("Chi ha dato le carte in questa mano?\n" + opzioni);
            dealerIndex = (parseInt(scelta) - 1);
            if (isNaN(dealerIndex) || !players[dealerIndex]) dealerIndex = 0;
        }

        players.forEach(p => {
            const mazzo = parseInt(document.querySelector(`.score-in[data-id="${p.id}"]`).value) || 0;
            const scope = parseInt(document.getElementById(`scope-${p.id}`).value) || 0;
            const totaleMano = mazzo + scope;
            p.score += totaleMano;
            p.playerHistory.push(totaleMano);
        });

        dealerIndex = (dealerIndex + 1) % players.length;
        
        // LOGICA DI FINE PARTITA:
        // Vince chi supera il limite E ha punteggio maggiore degli altri.
        // Se i punteggi massimi sono uguali, si continua.
        const maxScore = Math.max(...players.map(p => p.score));
        if (maxScore >= limit) {
            const countWinners = players.filter(p => p.score === maxScore).length;
            if (countWinners === 1) {
                isGameOver = true;
            }
        }
        
        save();
        render();
    }

    function render() {
        const inputArea = document.getElementById('inputs-area');
        const thead = document.getElementById('ranking-head');
        const tbody = document.getElementById('ranking-body');
        const header = document.getElementById('displayHeader');
        
        const maxMani = players.length > 0 ? Math.max(...players.map(p => p.playerHistory.length)) : 0;

        let headHtml = `<tr><th>Squadra</th><th>Tot</th>`;
        for(let i = maxMani; i >= 1; i--) headHtml += `<th>M${i}</th>`;
        headHtml += `</tr>`;
        thead.innerHTML = headHtml;

        inputArea.innerHTML = '';
        if (!isGameOver) {
            if (dealerIndex !== -1) header.innerHTML = `Mano di: <span style="color:var(--oro)">${players[dealerIndex].name} 🃏</span>`;
            players.forEach((p, index) => {
                const isDealer = index === dealerIndex;
                inputArea.innerHTML += `
                <div class="player-card ${isDealer ? 'dealer-active' : ''}">
                    <span class="player-name">${p.name} ${isDealer ? '🃏' : ''}</span>
                    <div class="grid-inputs">
                        <div class="input-box"><label>Punti Mazzo</label><input type="number" class="score-in" data-id="${p.id}" oninput="checkSum()" placeholder="0"></div>
                        <div class="input-box"><label>Scope</label><input type="number" id="scope-${p.id}" placeholder="0"></div>
                    </div>
                </div>`;
            });
        } else {
            const vincitore = [...players].sort((a,b) => b.score - a.score)[0];
            header.innerText = "Partita Finita";
            inputArea.innerHTML = `<h2 style="text-align:center; color:var(--oro)">VINCE: ${vincitore.name} 🏆</h2>`;
        }

        tbody.innerHTML = '';
        [...players].sort((a,b) => b.score - a.score).forEach(p => {
            const row = document.createElement('tr');
            if (isGameOver && p.score === Math.max(...players.map(pl => pl.score))) row.className = 'winner';
            
            let historyCols = '';
            for(let i = maxMani - 1; i >= 0; i--) {
                const punto = p.playerHistory[i] !== undefined ? p.playerHistory[i] : '-';
                historyCols += `<td>${punto}</td>`;
            }

            row.innerHTML = `<td>${p.name}</td><td><span class="badge">${p.score}</span></td>${historyCols}`;
            tbody.appendChild(row);
        });
        checkSum();
    }

    function undoLast() {
        players.forEach(p => { if (p.playerHistory.length > 0) p.score -= p.playerHistory.pop(); });
        if (dealerIndex !== -1) dealerIndex = (dealerIndex - 1 + players.length) % players.length;
        isGameOver = false;
        save();
        render();
    }

    function shareResults() {
        const classifica = [...players].sort((a,b) => b.score - a.score);
        let testo = `🃏 *Risultati Scopa* 🃏\n\n`;
        classifica.forEach((p) => testo += `${p.name}: ${p.score} pt (Mani: ${[...p.playerHistory].reverse().join(' - ')})\n`);
        if (navigator.share) {
            navigator.share({ title: 'Risultati Scopa', text: testo }).catch(() => {});
        } else {
            navigator.clipboard.writeText(testo).then(() => alert("Copiato negli appunti!"));
        }
    }

    function save() { localStorage.setItem('scopa_pino_final_v1', JSON.stringify({players, limit, isGameOver, dealerIndex})); }
    function resetGame() { if(confirm("Vuoi iniziare una nuova partita? I dati attuali verranno persi.")) { localStorage.removeItem('scopa_pino_final_v1'); location.reload(); } }
</script>
</body>
</html>
